<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantar AI - Analiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f0fdf4;
            --text-color: #1f2937;
            --card-bg: rgba(255, 255, 255, 0.85);
            --accent-color: #16a34a;
            --border-color: #e5e7eb;
        }

        body.dark-mode {
            --bg-color: #111827;
            --text-color: #f3f4f6;
            --card-bg: rgba(31, 41, 55, 0.85);
            --accent-color: #4ade80;
            --border-color: #374151;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.5s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 10% 20%, rgba(22, 163, 74, 0.1) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(22, 163, 74, 0.1) 0%, transparent 20%);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            max-width: 550px;
            width: 100%;
            animation: slideUp 0.8s forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .upload-area {
            border: 2px dashed var(--accent-color);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background-color: rgba(255, 255, 255, 0.5);
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .upload-area:hover {
            background-color: rgba(22, 163, 74, 0.05);
            transform: scale(1.01);
        }

        /* Yükleme İkonu ve Metinler */
        .upload-content {
            transition: opacity 0.3s ease;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Önizleme Resmi */
        #preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            display: none; /* Başlangıçta gizli */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            object-fit: contain;
        }

        .btn-custom {
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.4);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="glass-card text-center">
        <h2 class="mb-3 fw-bold" style="color: var(--accent-color);">
            <i class="fas fa-mushroom me-2"></i>Mantar AI
        </h2>
        <p class="mb-4 opacity-75">Yapay zeka ile saniyeler içinde mantar türü tespiti yapın.</p>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-4">
                <label for="file-upload" class="upload-area w-100">

                    <img id="preview-image" alt="Önizleme">

                    <div class="upload-content" id="upload-placeholder">
                        <div class="upload-icon">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <h5 class="fw-bold">Fotoğrafı Buraya Bırakın</h5>
                        <p class="small opacity-75 mb-0">veya seçmek için tıklayın</p>
                    </div>

                    <input id="file-upload" type="file" name="image" accept="image/*" class="d-none" required onchange="previewFile(event)">
                </label>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom btn-lg">
                    <i class="fas fa-search me-2"></i>Analiz Et
                </button>
            </div>
        </form>
    </div>

    <script>
        // Önizleme Fonksiyonu
        function previewFile(event) {
            const input = event.target;
            const preview = document.getElementById('preview-image');
            const placeholder = document.getElementById('upload-placeholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block'; // Resmi göster
                    placeholder.style.display = 'none'; // İkonu gizle
                }

                reader.readAsDataURL(input.files[0]);
            }
        }

        // Dark Mode
        const toggleBtn = document.getElementById('themeToggle');
        const icon = toggleBtn.querySelector('i');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            icon.classList.replace('fa-moon', 'fa-sun');
        }

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
