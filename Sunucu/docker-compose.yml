version: '3.8'

services:
  db:
    image: postgres:15
    container_name: mushapp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-mushapp_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mushapp_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: mushapp_web
    restart: always
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    container_name: mushapp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # Sertifika dosyaları buraya gelecek
      # - ./certs:/etc/nginx/certs
    depends_on:
      - web

volumes:
  postgres_data:
